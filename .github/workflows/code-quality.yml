name: Code Quality

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm --prefix api install
          npm --prefix web install

      - name: TypeScript check
        run: npm run lint

      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for TODO/FIXME comments..."
          grep -r "TODO\|FIXME" api/src web/src || echo "No TODO/FIXME found"

      - name: Check file sizes
        run: |
          echo "Checking for large files..."
          find api/src web/src -type f -size +100k -exec ls -lh {} \; || echo "No large files found"

      - name: Dependency audit
        run: |
          npm --prefix api audit --audit-level=moderate || true
          npm --prefix web audit --audit-level=moderate || true

      - name: Check for duplicate dependencies
        run: |
          echo "Checking for duplicate dependencies..."
          npm --prefix api ls express axios --depth=0 || true
          npm --prefix web ls react axios --depth=0 || true
