name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm --prefix api install
          npm --prefix web install

      - name: Build api and web
        run: npm run build

      - name: Package release artifacts
        run: |
          tar -czf toonflow-api-${{ github.ref_name }}.tar.gz -C api build
          tar -czf toonflow-web-${{ github.ref_name }}.tar.gz -C web dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            toonflow-api-${{ github.ref_name }}.tar.gz
            toonflow-web-${{ github.ref_name }}.tar.gz
          retention-days: 30

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ToonFlow ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            release/toonflow-api-${{ github.ref_name }}.tar.gz
            release/toonflow-web-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
