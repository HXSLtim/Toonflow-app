# 生产环境优化版本

services:
  toonflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.optimized
      args:
        GIT: ${GIT:-github}
        TAG: ${TAG:-}
        BRANCH: ${BRANCH:-}
    image: toonflow:${TAG:-latest}
    container_name: toonflow-prod
    restart: unless-stopped

    ports:
      - "${HTTP_PORT:-80}:80"
      - "${API_PORT:-60000}:60000"

    environment:
      - NODE_ENV=prod
      - TZ=Asia/Shanghai
    env_file:
      - ../api/env/.env.prod

    volumes:
      # 持久化日志
      - ./logs:/var/log:rw
      # 持久化数据库（如果使用 SQLite）
      - ./data:/app/data:rw
      # 持久化上传文件
      - ./uploads:/app/uploads:rw

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 安全配置
    security_opt:
      - no-new-privileges:true

    # 网络配置
    networks:
      - toonflow-network

networks:
  toonflow-network:
    driver: bridge
